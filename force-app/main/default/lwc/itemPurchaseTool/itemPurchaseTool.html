<template>
    <div class="slds-p-around_medium slds-is-relative">
        <div class="slds-grid slds-gutters">
            <div class="slds-col slds-size_3-of-4">
                <lightning-input
                        type="search"
                        label="Search Item"
                        onchange={handleSearchChange}
                        class="slds-m-bottom_small">
                </lightning-input>

                <div class="slds-grid slds-wrap">
                    <template for:each={products} for:item="prod">
                        <div key={prod.Id} class="slds-col slds-size_1-of-2 slds-p-around_xx-small">
                            <div class="slds-box slds-box_x-small">
                                <div class="slds-m-bottom_small" style="height: 100px; overflow: hidden;">
                                    <img src={prod.imageUrl} alt={prod.Name} style="width: 100%; object-fit: cover;" />
                                </div>

                                <p class="slds-text-heading_small slds-truncate">{prod.Name}</p>
                                <p class="slds-text-body_small">{prod.ProductCode}</p>

                                <div class="slds-m-top_small">
                                    <lightning-button
                                            label="Add"
                                            variant="brand"
                                            data-id={prod.Id}
                                            onclick={handleAddToCart}
                                            class="slds-stretch">
                                    </lightning-button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="slds-col slds-size_1-of-4 slds-border_left">
                <h2 class="slds-text-heading_small slds-m-bottom_small">FILTERS</h2>
                <p class="slds-m-bottom_small">Items found: <strong>{itemsCount}</strong></p>

                <lightning-combobox
                        label="Family"
                        value={selectedFamily}
                        options={familyOptions}
                        onchange={handleFamilyChange}>
                </lightning-combobox>

                <div class="slds-m-top_large slds-border_top slds-p-top_medium">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">
                        🛒 CART ({cart.length})
                    </h2>

                    <template for:each={cart} for:item="cartItem">
                        <div key={cartItem.Id} class="slds-box slds-box_xx-small slds-m-bottom_xx-small slds-theme_shade">
                            <p class="slds-truncate"><strong>{cartItem.Name}</strong></p>
                            <p class="slds-text-body_small">{cartItem.ProductCode}</p>
                        </div>
                    </template>

                    <template if:false={cart.length}>
                        <p class="slds-text-align_center slds-m-top_medium slds-text-color_weak">
                            Cart is empty
                        </p>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
