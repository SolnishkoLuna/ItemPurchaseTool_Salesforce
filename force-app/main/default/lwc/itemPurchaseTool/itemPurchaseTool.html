<template>
    <div class="slds-box slds-theme_default slds-p-around_medium">

        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_medium slds-p-bottom_small slds-border_bottom">
            <div class="slds-col">
                <lightning-button label="Create Item" variant="neutral"></lightning-button>
            </div>
            <div class="slds-col slds-text-align_center">
                <span class="slds-m-horizontal_medium"><strong>{accountName}</strong></span>
                <span class="slds-m-horizontal_medium">{accountNumber}</span>
                <span class="slds-m-horizontal_medium">{accountIndustry}</span>
            </div>
            <div class="slds-col slds-text-align_right">
                <lightning-button
                        label="Cart"
                        variant="brand"
                        onclick={handleCartClick}
                        icon-name="utility:cart">
                </lightning-button>
                <lightning-button
                        label="Cancel"
                        variant="base"
                        onclick={handleCancel}
                        class="slds-m-left_small">
                </lightning-button>
            </div>
        </div>

        <div class="slds-grid slds-gutters">

            <div class="slds-col slds-size_3-of-4">
                <div class="slds-m-bottom_small">
                    <lightning-input
                            type="search"
                            variant="label-hidden"
                            placeholder="SEARCH"
                            onchange={handleSearchChange}>
                    </lightning-input>
                </div>

                <div class="slds-grid slds-wrap">
                    <template for:each={products} for:item="prod">
                        <div key={prod.Id} class="slds-col slds-size_1-of-2 slds-p-around_xx-small">
                            <div class="slds-box slds-box_x-small slds-text-align_center">
                                <p class="slds-text-heading_small">{prod.Name}</p>
                                <div class="slds-m-vertical_x-small" style="height: 80px; background: #f3f3f3;">
                                    <img src={prod.imageUrl} style="height: 100%; object-fit: cover;"/>
                                </div>
                                <div class="slds-grid slds-grid_align-center">
                                    <lightning-button label="Details" variant="neutral" class="slds-m-right_xx-small"></lightning-button>
                                    <lightning-button label="Add" variant="brand" data-id={prod.Id} onclick={handleAddToCart}></lightning-button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="slds-col slds-size_1-of-4 slds-border_left">
                <h2 class="slds-text-heading_small slds-m-bottom_small">FILTERS</h2>

                <p class="slds-m-bottom_x-small"><strong>Items found: {itemsCount}</strong></p>

                <p class="slds-m-top_medium"><strong>Family:</strong></p>
                <lightning-combobox
                        name="family"
                        value={selectedFamily}
                        options={familyOptions}
                        onchange={handleFamilyChange}
                        variant="label-hidden">
                </lightning-combobox>

                <div class="slds-m-top_xlarge">
                    <p><strong>Selected Items ({cart.length}):</strong></p>
                    <template for:each={cart} for:item="item">
                        <div key={item.Id} class="slds-text-body_small slds-m-top_xx-small">
                            • {item.Name}
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
