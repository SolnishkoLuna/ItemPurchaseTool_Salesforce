<template>
    <lightning-card title="Item Purchase Tool" icon-name="standard:account">
        <lightning-button label="Cart" slot="actions" icon-name="utility:cart"></lightning-button>

        <div class="slds-p-around_medium">
            <lightning-record-view-form
                    record-id={recordId}
                    object-api-name="Account">

                <div class="slds-grid slds-gutters slds-grid_vertical-align-center">
                    <div class="slds-col">
                        <lightning-button label="Create Item" variant="neutral"></lightning-button>
                    </div>

                    <div class="slds-col">
                        <lightning-output-field field-name="Name"></lightning-output-field>
                    </div>
                    <div class="slds-col">
                        <lightning-output-field field-name="AccountNumber"></lightning-output-field>
                    </div>
                    <div class="slds-col">
                        <lightning-output-field field-name="Industry"></lightning-output-field>
                    </div>
                </div>
            </lightning-record-view-form>

        </div>
    </lightning-card>
</template>
